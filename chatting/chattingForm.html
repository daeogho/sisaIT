<!DOCTYPE html>
<html lang="ko">

<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <!-- 채팅을 하기 위하 라이브러리 -->
        <script src="/socket.io/socket.io.js"></script>
        <script>
                var socket;
                function chatStart() {
                        // 1. 채팅하는 서버에 접속하기
                        socket = io.connect();

                        // 2. 클라이언트가 서버에게 문자 보내기 이벤트 발생시킴
                        // emit() : 이벤트를 발생시키는 함수
                        //       이벤트 종류, 서버로 보낼문자
                        socket.emit('hello', '안녕!!!! client가 서버로 보낸문자야!!!!!');

                        // 서버에서 보낸 문자 받기를 처리할 이벤트 
                        socket.on('hi', function(receive){
                                document.getElementById("chatMsg").innerHTML += "<p>"+receive + "</p>";

                        });

                        // 4. 채팅하기
                        // 클라이언트가 문자를 서버로 보내기
                        function sendMessage(){
                                // 메시지가 있을때만 서버로 문자로 보내는 이벤트 발생
                                var sendMsg = document.getElementById("msg").value;
                                if(sendMsg != ""){
                                        socket.emit('hello', sendMsg);
                                } 
                                document.getElementById("msg").value ="";
                        }
                        // 버튼클릭
                        document.getElementById("send").addEventListener('click',function(){
                                sendMessage();
                        });
                        // enter입력하면
                        document.getElementById("msg").onkeyup = (event)=>{
                                if(event.keyCode == 13){
                                sendMessage();
                                }
                        }
                }
        </script>
</head>

<body onload="chatStart()">
        <div class="container" style="width:600px;">

                <h1>채팅하기</h1>
                message : <input type="text" id="msg">
                <input type="button" id="send" value="보내기">
                <hr />
                <!-- 대화 내용 표시 하는 곳-->
                <div id="chatMsg" style="width:600px; background:#ddd; margin:0 auto; padding:10px;"></div>
        </div>
</body>

</html>
